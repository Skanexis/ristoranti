<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>I nostri servizi | Ristoranti d'Italia</title>
    <meta
      name="description"
      content="I nostri servizi professionali: sviluppo bot Telegram, mini app, social growth ed exchange crypto con listino chiaro."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@10..48,500;10..48,600;10..48,700;10..48,800&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./services.css?v=20260321-32" />
  </head>
  <body>
    <div class="bg-ornament" aria-hidden="true">
      <span class="blob blob-one"></span>
      <span class="blob blob-two"></span>
      <span class="blob blob-three"></span>
    </div>
    <div class="scroll-meter" aria-hidden="true"><span id="scrollMeterBar"></span></div>
    <div id="cursorAura" class="cursor-aura" aria-hidden="true"></div>

    <main class="services-shell">
      <header id="heroSection" class="hero reveal-item" data-rail-label="Hero">
        <div class="hero-layout">
          <div class="hero-content">
            <div class="hero-links">
              <a href="/" class="hero-link">Torna alla home</a>
            </div>

            <p id="heroBadge" class="hero-badge"></p>
            <h1 id="heroTitle" class="hero-title"></h1>
            <p id="heroSubtitle" class="hero-subtitle"></p>
            <p id="heroHighlight" class="hero-highlight"></p>
            <div class="hero-actions">
              <a
                id="heroPrimaryCta"
                class="hero-btn hero-btn-primary"
                href="#"
                target="_blank"
                rel="noopener noreferrer"
              ></a>
              <a
                id="heroSecondaryCta"
                class="hero-btn hero-btn-secondary"
                href="#"
                target="_blank"
                rel="noopener noreferrer"
              ></a>
            </div>
          </div>
        </div>
      </header>

      <section id="catalogSection" class="catalog reveal-item" aria-labelledby="catalogHeading" data-rail-label="Servizi">
        <div class="section-head">
          <p class="section-kicker">Listino servizi</p>
          <h2 id="catalogHeading">Servizi professionali</h2>
          <p>Visualizzazione chiara di descrizione, prezzo e mantenimento.</p>
        </div>

        <div class="catalog-toolbar">
          <div id="serviceCategoryFilters" class="filter-row" role="tablist" aria-label="Filtro categoria"></div>
          <div class="toolbar-controls">
            <label class="top-toggle">
              <input id="serviceTopOnly" type="checkbox" />
              Solo top service
            </label>
            <button id="clearFiltersBtn" type="button" class="switch-btn switch-btn-reset">Mostra tutti</button>
          </div>
          <p id="serviceCountLabel" class="service-count" aria-live="polite"></p>
        </div>

        <article id="spotlightBox" class="spotlight-box" aria-live="polite">
          <div class="spotlight-main">
            <div class="spotlight-top">
              <p id="spotlightCategory" class="spotlight-category"></p>
              <p id="spotlightFeatured" class="spotlight-featured" hidden>Top service</p>
            </div>
            <h3 id="spotlightTitle" class="spotlight-title"></h3>
            <p id="spotlightDescription" class="spotlight-description"></p>
            <div class="spotlight-price-wrap">
              <p id="spotlightPrice" class="spotlight-price"></p>
              <p id="spotlightPriceNote" class="spotlight-price-note"></p>
            </div>
            <section id="spotlightBankPricePanel" class="spotlight-bank-panel" hidden>
              <ul id="spotlightBankPriceList" class="spotlight-bank-list"></ul>
            </section>
            <ul id="spotlightFeatures" class="spotlight-features"></ul>
          </div>
        </article>

        <div id="serviceBlocksGrid" class="service-grid"></div>
      </section>

      <section
        id="socialSection"
        class="social-section reveal-item"
        aria-labelledby="socialHeading"
        data-rail-label="Social"
      >
        <div class="section-head">
          <p class="section-kicker">Social growth</p>
          <h2 id="socialHeading"></h2>
          <p id="socialSubtitle"></p>
        </div>
        <div id="socialGrid" class="social-grid"></div>
      </section>

      <section id="closingSection" class="closing reveal-item" aria-labelledby="closingTitle" data-rail-label="Closing">
        <h2 id="closingTitle"></h2>
        <p id="closingDescription"></p>
      </section>
    </main>

    <script src="/shared/data-store.js?v=20260321-35"></script>
    <script src="./services.js?v=20260321-33"></script>
  </body>
</html>
