<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Ristoranti d'Italia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260508-ux-pass-5" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body class="preload-pending map-only-page">
    <div id="mobilePreloader" class="mobile-preloader" aria-live="polite">
      <div class="mobile-preloader-frame" aria-hidden="true">
        <div class="mobile-preloader-glow"></div>
        <div class="mobile-preloader-ring"></div>
        <div class="mobile-preloader-dot"></div>
      </div>
      <p class="mobile-preloader-title">Servizio attivo dal 2019</p>
      <p class="mobile-preloader-subtitle">Caricamento in corso</p>
      <div class="mobile-preloader-bar" aria-hidden="true">
        <span></span>
      </div>
    </div>
    <script>
      (function () {
        var unlockDelayMs = 2500;

        function forceUnlockPreloader() {
          var body = document.body;
          if (!body) return;

          body.classList.remove(
            "preload-pending",
            "preload-exit"
          );

          var preloader = document.getElementById("mobilePreloader");
          if (preloader && preloader.parentNode) {
            preloader.parentNode.removeChild(preloader);
          }
        }

        window.setTimeout(forceUnlockPreloader, unlockDelayMs);
        window.addEventListener("pageshow", function () {
          window.setTimeout(forceUnlockPreloader, 180);
        });
      })();
    </script>
    <main class="app map-only-app">
      <section class="map-home reveal" id="selectionStep">
        <h1 id="selectionTitle" class="sr-only">Mappa interattiva d'Italia</h1>
        <p id="selectionHint" class="sr-only">Seleziona una regione dalla mappa.</p>
        <div id="selectionContent"></div>
      </section>
      <section class="step card reveal hidden" id="pointsStep">
        <p class="step-label">Punti attivi</p>
        <h2 id="pointsTitle"></h2>
        <div id="pointsContent"></div>
      </section>
    </main>
    <div class="floating-tools" aria-label="Navigazione rapida">
      <button id="scrollTopBtn" class="floating-btn floating-btn-top" type="button" aria-label="Torna in alto">↑</button>
    </div>
    <script src="/shared/data-store.js?v=20260321-3"></script>
    <script src="./italy-regions-map.js?v=20260508-2"></script>
    <script src="./script.js?v=20260508-ux-pass-5"></script>
  </body>
</html>
